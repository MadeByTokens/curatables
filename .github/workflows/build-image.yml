name: Build Pi image

# Builds the Raspberry Pi appliance image with pi-gen (in Docker, via
# qemu ARM emulation). Heavy job (~30-60 min, several GB) so it does NOT
# run on every push: trigger it by hand, or it runs automatically when a
# GitHub Release is published and attaches the .img.xz as a release asset.
on:
  workflow_dispatch: {}
  release:
    types: [published]

concurrency:
  group: build-image-${{ github.ref }}
  cancel-in-progress: true

# Default to read-only; the release-attach step needs write on contents.
permissions:
  contents: write

jobs:
  build-image:
    name: pi-gen image (arm64)
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4

      # pi-gen + the rootfs need more space than the runner has free by
      # default. Reclaim the big preinstalled toolchains we don't use.
      - name: Free up disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
                      /opt/hostedtoolcache/CodeQL /usr/local/.ghcup
          sudo docker image prune -af || true
          df -h /

      # Registers the qemu-aarch64 binfmt handler that pi-gen's ARM
      # chroot (and pi-gen/build.sh's precheck) depends on.
      - name: Set up QEMU (ARM emulation)
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      # setup-qemu-action registers binfmt but does not provide the
      # `qemu-aarch64` binary that pi-gen's build-docker.sh greps for with
      # `which`. Install the static qemu so build.sh's shim can resolve it.
      - name: Install static qemu binary
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends qemu-user-static

      - name: Build image
        run: ./pi-gen/build.sh

      - name: Locate artifact
        id: artifact
        run: |
          img="$(ls pi-gen/.pi-gen/deploy/*.img.xz | head -n1)"
          echo "path=${img}" >> "$GITHUB_OUTPUT"
          echo "name=$(basename "${img}")" >> "$GITHUB_OUTPUT"
          ls -lh pi-gen/.pi-gen/deploy/

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.artifact.outputs.name }}
          path: ${{ steps.artifact.outputs.path }}
          if-no-files-found: error

      # On a published release, attach the image as a downloadable asset.
      - name: Attach to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.artifact.outputs.path }}
