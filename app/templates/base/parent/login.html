<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>curatables - Parent Login</title>
<style>
body { font-family: sans-serif; max-width: 400px; margin: 80px auto; padding: 0 20px; color: #333; }
h1 { color: #2a9d8f; }
label { display: block; margin-top: 16px; font-weight: bold; }
input[type=password] { width: 100%; padding: 10px; margin-top: 4px; box-sizing: border-box; font-size: 16px; }
button { margin-top: 24px; padding: 12px 32px; background: #2a9d8f; color: #fff; border: none; font-size: 16px; cursor: pointer; }
button:hover { background: #238577; }
.error { color: #d33; font-weight: bold; }
</style>
</head>
<body>
<h1>curatables</h1>
<p>Parent Dashboard Login</p>
{% if error %}<p class="error">{{ error }}</p>{% endif %}
<form method="POST" action="/parent/login">
  <label for="password">Password</label>
  <input type="password" id="password" name="password" required autofocus>
  <button type="submit">Log In</button>
</form>
</body>
</html>
