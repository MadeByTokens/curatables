{% extends "kid/base.html" %}
{% block content %}
<div class="mw-600 mx-auto p-16">
  <h2>Edit Channel</h2>

  <form method="POST" action="/channel/{{ channel.id }}/edit" enctype="multipart/form-data">
    <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
    <div class="mb-16">
      <label for="name" class="d-block fw-bold mb-4">Name</label>
      <input type="text" id="name" name="name" maxlength="64"
             value="{{ channel.name }}" class="w-100 p-8 fs-15 bd-ccc r-4 bb">
    </div>

    <div class="mb-16">
      <label for="description" class="d-block fw-bold mb-4">Description</label>
      <textarea id="description" name="description" rows="3" maxlength="500" class="w-100 p-8 fs-15 bd-ccc r-4 bb ff-sans">{{ channel.description }}</textarea>
    </div>

    <div class="mb-16">
      <label for="color" class="d-block fw-bold mb-4">Color</label>
      <input type="color" id="color" name="color" value="{{ channel.color or '#2a9d8f' }}" class="bd-ccc r-4 clickable x-033">
    </div>

    <div class="mb-16">
      <label class="d-block fw-bold mb-4">Banner Image</label>
      {% if channel.banner_filename %}
      <img src="/media/channel/{{ channel.id }}/banner" alt="" class="w-100 of-cover r-4 mb-6 x-034">
      {% endif %}
      <input type="file" name="banner" accept="image/*" class="fs-14">
    </div>

    <div class="mb-16">
      <label class="d-block fw-bold mb-4">Channel Icon</label>
      {% if channel.icon_filename %}
      <img src="/media/channel/{{ channel.id }}/icon" alt="" class="r-circle of-cover mb-6 x-027">
      {% endif %}
      <input type="file" name="icon" accept="image/*" class="fs-14">
    </div>

    <div class="d-flex gap-8">
      <button type="submit" class="accent-bg on-dark bd-none r-4 fs-15 clickable x-018">Save</button>
      <a href="/channel/{{ channel.id }}" class="on-dark r-4 no-underline fs-15 x-019">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
